# Derm-Vision Configuration — Custom CNN Baseline
# ISIC 2019 Skin Lesion Classification

data:
  image_size: 300
  num_classes: 8
  class_names:
    - MEL    # Melanoma
    - NV     # Melanocytic nevus
    - BCC    # Basal cell carcinoma
    - AKIEC  # Actinic keratosis / Bowen's disease
    - BKL    # Benign keratosis
    - DF     # Dermatofibroma
    - VASC   # Vascular lesion
    - SCC    # Squamous cell carcinoma
  data_dir: data/raw/ISIC_2019_Training_Input/ISIC_2019_Training_Input
  metadata_csv: data/raw/ISIC_2019_Training_Metadata.csv
  splits_dir: data/splits

training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 50
  num_workers: 0
  early_stopping_patience: 10
  scheduler: cosine

model:
  backbone: custom-cnn
  dropout: 0.3
  loss: focal
  focal_gamma: 2.0
  use_class_weights: false

wandb:
  project: derm-vision
  entity: null
  log_interval: 10

output:
  checkpoint_dir: outputs/checkpoints
  results_dir: outputs/results
